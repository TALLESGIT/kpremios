<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/zk-logo.svg" />
    <link rel="icon" type="image/svg+xml" href="/zk-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ZK Prêmios - Sistema de rifas e sorteios online" />
    <meta name="keywords" content="rifas, sorteios, prêmios, ZK" />
    <meta name="author" content="ZK Prêmios" />
    <title>ZK Prêmios</title>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Eruda: Console de debug para mobile -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>
      // Inicializar Eruda apenas em mobile ou quando ?debug=true na URL
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      const hasDebugParam = window.location.search.includes('debug=true');
      
      if (isMobile || hasDebugParam) {
        eruda.init();
        console.log('🔧 Eruda Debug Console ativado!');
        console.log('📱 Dispositivo:', navigator.userAgent);
      }
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
