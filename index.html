<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/zk-logo.svg" />
    <link rel="icon" type="image/svg+xml" href="/zk-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ZK Prêmios - Sistema de rifas e sorteios online" />
    <meta name="keywords" content="rifas, sorteios, prêmios, ZK" />
    <meta name="author" content="ZK Prêmios" />
    <title>ZK Prêmios</title>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Eruda: Console de debug para mobile -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>
      // Inicializar Eruda SEMPRE (para debug)
      try {
        eruda.init();
        console.log('🔧 Eruda Debug Console ativado!');
        console.log('📱 Dispositivo:', navigator.userAgent);
        console.log('📏 Viewport:', window.innerWidth, 'x', window.innerHeight);
        
        // Adicionar botão de teste visível
        setTimeout(() => {
          const testBtn = document.createElement('div');
          testBtn.style.cssText = `
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: red;
            color: white;
            padding: 10px;
            border-radius: 8px;
            z-index: 999999;
            font-size: 12px;
            pointer-events: auto;
          `;
          testBtn.textContent = '🔧 Debug';
          testBtn.onclick = () => {
            alert('Eruda está funcionando! Toque no ícone verde no canto inferior direito.');
          };
          document.body.appendChild(testBtn);
        }, 2000);
      } catch (e) {
        console.error('Erro ao inicializar Eruda:', e);
        alert('Erro ao carregar console de debug');
      }
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
