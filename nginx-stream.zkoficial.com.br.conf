# =====================================================
# NGINX CONFIGURATION: stream.zkoficial.com.br
# =====================================================
# Proxy para MediaMTX (WebRTC/HLS) com CORS para WHEP
# O frontend (Vercel/zkoficial.com.br) faz fetch cross-origin para WHEP
#
# Instalação:
# 1. Copiar para: /etc/nginx/sites-available/stream.zkoficial.com.br
# 2. ln -s /etc/nginx/sites-available/stream.zkoficial.com.br /etc/nginx/sites-enabled/
# 3. nginx -t && systemctl reload nginx
# 4. certbot --nginx -d stream.zkoficial.com.br
#
# MediaMTX: porta 8888 (HLS), 8889 (WebRTC/WHEP)

upstream mediamtx_webrtc {
    server 127.0.0.1:8889;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name stream.zkoficial.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name stream.zkoficial.com.br;

    ssl_certificate /etc/letsencrypt/live/stream.zkoficial.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stream.zkoficial.com.br/privkey.pem;

    # =====================================================
    # CORS: OPTIONS tratado aqui; POST WHEP usa CORS do MediaMTX (evitar duplicação)
    # =====================================================
    location / {
        # Preflight OPTIONS (browser envia antes do POST)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Access-Control-Max-Age' 86400;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain';
            return 204;
        }

        proxy_pass http://mediamtx_webrtc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
