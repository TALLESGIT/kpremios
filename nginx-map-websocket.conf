# =====================================================
# MAP PARA WEBSOCKET UPGRADE
# =====================================================
# Este arquivo DEVE ser incluído no nginx.conf principal
# no nível http (não no nível server)
#
# Instruções:
# 1. Copiar este conteúdo para /etc/nginx/nginx.conf
# 2. Colocar DENTRO do bloco http { ... }
# 3. ANTES de qualquer bloco server { ... }
#
# Ou adicionar esta linha no nginx.conf dentro do bloco http:
# include /etc/nginx/conf.d/websocket-upgrade.conf;
#
# E copiar este arquivo para /etc/nginx/conf.d/websocket-upgrade.conf

# Map para detectar upgrade de conexão WebSocket
# CRÍTICO: Deve estar no nível http, não server
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
