# ✅ RTMP: Ingest do OBS (padrão)
rtmp: yes
rtmpAddress: :1935

# ✅ SRT: Ingest do ZK Studio (baixa latência, Opus nativo)
srt: yes
srtAddress: :8890

# ✅ WebRTC: Distribuição para o site (WHEP) — tempo real
webrtc: yes
webrtcAddress: :8889
webrtcLocalUDPAddress: :8189
webrtcAllowOrigins: ['*']
webrtcIPsFromInterfaces: no
webrtcAdditionalHosts: ['76.13.82.48']

# ICE Servers (STUN + TURN)
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302
  - url: turn:stream.zkoficial.com.br:3478?transport=udp
    username: zkstudio
    password: e7x89sF2k9Lp3M5nV1j6H4rQ

# API — obrigatório para o backend monitor detectar streams
api: yes
apiAddress: :9997

# Caminhos (Paths)
paths:
  ~^live(/.*)?$:
    source: publisher
    writeQueueSize: 512

# ✅ HLS: Distribuição Low Latency (LL-HLS)
hls: yes
hlsAddress: :8888
hlsVariant: lowLatency
hlsSegmentDuration: 1s
hlsPartDuration: 200ms
hlsSegmentCount: 10
hlsAllowOrigins: ['*']
hlsAlwaysRemux: yes
