# ✅ SRT: Ingest do ZK Studio (baixa latência, Opus nativo)
srt: yes
srtAddress: :8890

# ✅ WebRTC: Distribuição para o site (WHEP) — tempo real
webrtc: yes
webrtcAddress: :8889
webrtcLocalUDPAddress: :8189
webrtcAllowOrigins: ['*']
# Forçar IPv4 público — evita "deadline exceeded" e delays de ICE
# Valide o IP da VPS com: curl -4 ifconfig.me
# Se o servidor anunciar IPv6 e causar deadline exceeded, inclua apenas o IPv4 aqui
webrtcIPsFromInterfaces: no
webrtcAdditionalHosts: ['76.13.82.48']

# ICE Servers (STUN + TURN) — use webrtcICEServers2 (formato YAML)
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302
  - url: turn:stream.zkoficial.com.br:3478?transport=udp
    username: zkstudio
    password: e7x89sF2k9Lp3M5nV1j6H4rQ

# API — obrigatório para o backend monitor detectar streams
api: yes
apiAddress: :9997

# Regex path: aceita live, live/ZkOficial, live/qualquercoisa
# writeQueueSize: reduz packet loss quando readers estão lentos (evita "reader is too slow")
paths:
  ~^live(/.*)?$:
    source: publisher
    writeQueueSize: 384
