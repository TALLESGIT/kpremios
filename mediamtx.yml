# ✅ RTMP: Ingest do OBS
rtmp: yes
rtmpAddress: :1935

# ✅ SRT: Ingest do ZK Studio
srt: yes
srtAddress: :8890

# ✅ WebRTC (WHEP)
webrtc: yes
webrtcAddress: :8889
webrtcLocalUDPAddress: :8189
webrtcAllowOrigins: ['*']
webrtcIPsFromInterfaces: no
webrtcAdditionalHosts: ['76.13.82.48']

# ICE Servers
webrtcICEServers:
  - url: stun:stun.l.google.com:19302

# API
api: yes
apiAddress: :9997

# Caminhos (Configuração de Ingest)
paths:
  all:
    source: publisher

# ✅ HLS: Distribuição Low Latency (LL-HLS)
hls: yes
hlsAddress: :8888
hlsVariant: lowLatency
hlsSegmentDuration: 1s
hlsPartDuration: 200ms
hlsSegmentCount: 10
hlsAllowOrigins: ['*']
hlsAlwaysRemux: yes
