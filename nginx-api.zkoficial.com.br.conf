# =====================================================
# NGINX CONFIGURATION: api.zkoficial.com.br
# =====================================================
# Configuração para proxy reverso do backend Socket.IO
# Suporta WebSocket (WSS) via upgrade de conexão
#
# Instalação:
# 1. Copiar para: /etc/nginx/sites-available/api.zkoficial.com.br
# 2. Criar symlink: ln -s /etc/nginx/sites-available/api.zkoficial.com.br /etc/nginx/sites-enabled/
# 3. Testar: nginx -t
# 4. Recarregar: systemctl reload nginx
#
# Certificado SSL:
# certbot --nginx -d api.zkoficial.com.br
#
# ⚠️ IMPORTANTE: O map $http_upgrade $connection_upgrade DEVE estar
# no /etc/nginx/nginx.conf no nível http, NÃO neste arquivo!
# Veja: CONFIGURAR_NGINX_MAP_WEBSOCKET.md

# Upstream para o backend Socket.IO
upstream socketio_backend {
    server 127.0.0.1:3001;
    keepalive 64;
}

# Redirecionar HTTP para HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.zkoficial.com.br;

    # Para Let's Encrypt (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirecionar todo o resto para HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Servidor HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.zkoficial.com.br;

    # =====================================================
    # CERTIFICADOS SSL (Let's Encrypt)
    # =====================================================
    ssl_certificate /etc/letsencrypt/live/api.zkoficial.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.zkoficial.com.br/privkey.pem;

    # Se usar Cloudflare SSL, descomente e ajuste:
    # ssl_certificate /etc/ssl/cloudflare/api.zkoficial.com.br.crt;
    # ssl_certificate_key /etc/ssl/cloudflare/api.zkoficial.com.br.key;

    # =====================================================
    # CONFIGURAÇÃO SSL OTIMIZADA
    # =====================================================
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # =====================================================
    # HEADERS DE SEGURANÇA
    # =====================================================
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # =====================================================
    # WEBSOCKET (SOCKET.IO) - CRÍTICO
    # =====================================================
    location /socket.io/ {
        proxy_pass http://socketio_backend;
        proxy_http_version 1.1;

        # Headers WebSocket (OBRIGATÓRIO para upgrade)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Headers padrão
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts para conexões longas (streaming)
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;

        # Buffering desabilitado para WebSocket
        proxy_buffering off;
        proxy_cache off;

        # Cloudflare compatibility (se usar proxy do Cloudflare)
        # Descomente se o domínio estiver com proxy ativado no Cloudflare
        # proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        # proxy_set_header CF-Ray $http_cf_ray;
    }

    # =====================================================
    # HEALTH CHECK E ROTAS HTTP
    # =====================================================
    location / {
        proxy_pass http://socketio_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts normais para HTTP
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # =====================================================
    # LOGS
    # =====================================================
    access_log /var/log/nginx/api.zkoficial.com.br-access.log;
    error_log /var/log/nginx/api.zkoficial.com.br-error.log warn;
}
